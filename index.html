<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Для Максима ❤️</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      background: radial-gradient(circle at top, #1e1e1e, #0f0f0f);
      color: white;
      user-select: none;
    }

    .background-glow {
      position: absolute;
      width: 260px;
      height: 260px;
      background: rgba(255, 105, 135, 0.12);
      border-radius: 50%;
      filter: blur(80px);
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 0;
    }

    .top {
      position: absolute;
      top: 12px;
      width: 100%;
      text-align: center;
      z-index: 5;
      padding: 0 14px;
    }

    .title { font-size: 20px; font-weight: 700; }
    .subtitle { font-size: 12px; opacity: 0.75; margin-top: 4px; }

    .counter { margin-top: 8px; font-size: 13px; opacity: 0.85; }

    .progress-wrap {
      width: 80%;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      margin: 10px auto 0;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff4d6d, #ff8fa3);
      transition: width 0.3s;
    }

    #game {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* PAUSE STATE */
    .paused .heart {
      animation-play-state: paused !important;
    }

    .heart {
      position: absolute;
      font-size: 32px;
      cursor: pointer;
      animation: fall linear forwards;
      filter: drop-shadow(0 0 8px rgba(255,80,120,0.4));
      touch-action: manipulation;
    }

    .type1 { color: #ff4d6d; }
    .type2 { color: #ff8fa3; }
    .type3 { color: #ffccd5; }

    .gold {
      color: gold !important;
      font-size: 36px;
      filter: drop-shadow(0 0 12px gold);
    }

    @keyframes fall {
      from { transform: translateY(-10vh); }
      to { transform: translateY(110vh); }
    }

    .phrase {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      font-size: 15px;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 20;
    }

    .phrase.show { opacity: 1; }

    .final {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s;
      z-index: 50;
    }

    .final.show { opacity: 1; pointer-events: all; }

    .big-heart {
      font-size: 70px;
      animation: pulse 1.2s infinite;
      margin-bottom: 10px;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .final-text {
      font-size: 18px;
      line-height: 1.6;
      max-width: 500px;
    }

    .secret {
      margin-top: 14px;
      font-size: 16px;
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.8s;
      color: gold;
    }

    .secret.show {
      opacity: 1;
      transform: scale(1);
    }
  </style>
</head>
<body>

<div class="background-glow"></div>

<div class="top">
  <div class="title">Для Максима ❤️</div>
  <div class="subtitle">Лови сердечки и наш месяц</div>

  <div class="counter">Поймано: <span id="count">0</span>/15</div>

  <div class="progress-wrap">
    <div id="progress" class="progress"></div>
  </div>
</div>

<div id="game"></div>
<div id="phrase" class="phrase"></div>

<div id="final" class="final">
  <div class="big-heart">❤️</div>

  <div class="final-text">
    Максим, спасибо, что терпишь свою вредину 😌❤️
    <br><br>
    И спасибо за этот месяц.
    <br><br>
    Мне с тобой очень хорошо.
  </div>

  <div id="secret" class="secret">✨ ты прошёл наш месяц ✨</div>
</div>

<script>

const phrases = [
'«Тише, родная» — и я сразу успокаиваюсь ❤️',
'ты мой личный «выдыхай»',
'ты говоришь, что не милый, но я тебе не верю',
'моя вредина — звучит как любовь',
'когда ты говоришь «моя жопка» — я почему-то таю 😭❤️',
'рядом с тобой даже плакать не страшно',
'ты умеешь смешить меня даже тогда, когда я злюсь',
'мне спокойно рядом с тобой',
'твой голос — мой комфорт',
'я поняла, как скучаю по тебе, когда пропала связь',
'мы учимся здоровым отношениям вместе',
'спасибо, что поддерживаешь меня',
'«вот-вот» уже звучит как что-то родное',
'ты мой любимый человек для флирта 😏',
'рядом с тобой хочется становиться лучше ❤️'
];

let score = 0;
let index = 0;
let goldHits = 0;

const game = document.getElementById('game');
const count = document.getElementById('count');
const phrase = document.getElementById('phrase');
const progress = document.getElementById('progress');
const final = document.getElementById('final');
const secret = document.getElementById('secret');

let spawnInterval;
let paused = false;

function vibrate(pattern){
  if(navigator.vibrate){ navigator.vibrate(pattern); }
}

function pauseGame(){
  paused = true;
  document.body.classList.add('paused');
  clearInterval(spawnInterval);
}

function resumeGame(){
  paused = false;
  document.body.classList.remove('paused');
  spawnInterval = setInterval(spawnHeart, 900);
}

function showPhrase(text){
  pauseGame();

  phrase.innerText = text;
  phrase.classList.add('show');

  setTimeout(()=>{
    phrase.classList.remove('show');
    resumeGame();
  }, 3200);
}

function spawnHeart(){
  const h = document.createElement('div');
  h.classList.add('heart');

  const isGold = Math.random() < 0.12;

  if(isGold){
    h.innerHTML = '💛';
    h.classList.add('gold');
  } else {
    const types = ['type1','type2','type3'];
    const emojis = ['❤️','💖','💗'];
    h.classList.add(types[Math.floor(Math.random()*types.length)]);
    h.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
  }

  h.style.left = Math.random()*90 + 'vw';
  h.style.animationDuration = (4 + Math.random()*3) + 's';

  game.appendChild(h);

  h.addEventListener('click', e => {
    h.remove();

    vibrate(isGold ? [80,30,120] : 40);

    score++;
    count.innerText = score;

    progress.style.width = (score/15)*100 + '%';

    showPhrase(phrases[index]);
    index = (index+1)%phrases.length;

    if(isGold) goldHits++;

    if(score>=15){
      pauseGame();
      setTimeout(()=>{
        final.classList.add('show');
        setTimeout(()=> secret.classList.add('show'), 1200);
      },800);
    }
  });

  setTimeout(()=> h.remove(), 8000);
}

spawnInterval = setInterval(spawnHeart, 900);

</script>

</body>
</html>
