<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Для Максима ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      background: radial-gradient(circle at top, #1e1e1e, #0f0f0f);
      color: white;
      user-select: none;
    }

    .background-glow {
      position: absolute;
      width: 280px;
      height: 280px;
      background: rgba(255, 105, 135, 0.12);
      border-radius: 50%;
      filter: blur(80px);
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 0;
    }

    .top {
      position: absolute;
      top: 14px;
      width: 100%;
      text-align: center;
      z-index: 5;
      padding: 0 16px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      opacity: 0.75;
      line-height: 1.4;
    }

    .counter {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.85;
    }

    #game {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      z-index: 2;
    }

    .heart {
      position: absolute;
      font-size: 34px;
      cursor: pointer;
      animation: fall linear forwards;
      filter: drop-shadow(0 0 8px rgba(255, 80, 120, 0.4));
      touch-action: manipulation;
    }

    @keyframes fall {
      from { transform: translateY(-10vh); }
      to { transform: translateY(110vh); }
    }

    .phrase {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 16px;
      text-align: center;
      font-size: 16px;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.35s ease;
      z-index: 20;
      pointer-events: none;
    }

    .phrase.show {
      opacity: 1;
    }

    .final-screen {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      z-index: 50;
    }

    .final-screen.show {
      opacity: 1;
      pointer-events: all;
    }

    .final-heart {
      font-size: 64px;
      animation: pulse 1.5s infinite;
      margin-bottom: 16px;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .final-text {
      font-size: 18px;
      line-height: 1.6;
      max-width: 520px;
    }

    .spark {
      position: absolute;
      color: #ff7b9c;
      animation: pop 0.6s forwards;
      pointer-events: none;
    }

    @keyframes pop {
      from { opacity: 1; transform: scale(0.6); }
      to { opacity: 0; transform: translateY(-30px) scale(1.6); }
    }

    @media (max-width: 480px) {
      .title { font-size: 20px; }
      .subtitle { font-size: 12px; }
      .phrase { font-size: 15px; }
      .final-text { font-size: 16px; }
    }
  </style>
</head>
<body>

  <div class="background-glow"></div>

  <div class="top">
    <div class="title">Для Максима ❤️</div>
    <div class="subtitle">Лови сердечки — читай, что Настя чувствует ✨</div>
    <div class="counter">Поймано: <span id="count">0</span>/15</div>
  </div>

  <div id="game"></div>
  <div id="phrase" class="phrase"></div>

  <div id="final" class="final-screen">
    <div class="final-heart">❤️</div>
    <div class="final-text">
      Максим, спасибо, что терпишь свою вредину 😌❤️
      <br><br>
      И спасибо за этот месяц.
      <br><br>
      Мне с тобой очень хорошо.
    </div>
  </div>

  <script>
    const phrases = [
      '«Тише, родная» — и я сразу успокаиваюсь ❤️',
      'ты мой личный «выдыхай»',
      'ты говоришь, что не милый, но я тебе не верю',
      'моя вредина — звучит как любовь',
      'когда ты говоришь «моя жопка» — я почему-то таю 😭❤️',
      'рядом с тобой даже плакать не страшно',
      'ты умеешь смешить меня даже тогда, когда я злюсь',
      'мне спокойно рядом с тобой',
      'твой голос — мой комфорт',
      'я скучаю, когда мы без связи',
      'мы учимся здоровым отношениям вместе',
      'спасибо, что поддерживаешь меня',
      '«вот-вот» уже звучит как что-то родное',
      'ты мой любимый человек для флирта 😏',
      'рядом с тобой хочется становиться лучше ❤️'
    ];

    const game = document.getElementById('game');
    const phraseBox = document.getElementById('phrase');
    const counter = document.getElementById('count');
    const finalScreen = document.getElementById('final');

    let score = 0;
    let phraseIndex = 0;
    let canClick = true;

    function showPhrase(text) {
      phraseBox.innerHTML = text;
      phraseBox.classList.add('show');
      canClick = false;

      setTimeout(() => {
        phraseBox.classList.remove('show');
        canClick = true;
      }, 3000); // увеличено время чтения
    }

    function popEffect(x, y) {
      const spark = document.createElement('div');
      spark.classList.add('spark');
      spark.innerHTML = '✨';
      spark.style.left = x + 'px';
      spark.style.top = y + 'px';
      document.body.appendChild(spark);
      setTimeout(() => spark.remove(), 600);
    }

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤️';

      heart.style.left = Math.random() * 85 + 'vw';
      heart.style.animationDuration = (5 + Math.random() * 2.5) + 's';

      game.appendChild(heart);

      heart.addEventListener('click', (e) => {
        if (!canClick) return;

        popEffect(e.clientX, e.clientY);
        heart.remove();

        score++;
        counter.textContent = score;

        showPhrase(phrases[phraseIndex]);
        phraseIndex = (phraseIndex + 1) % phrases.length;

        if (score >= 15) {
          setTimeout(() => finalScreen.classList.add('show'), 1000);
        }
      });

      setTimeout(() => heart.remove(), 8000);
    }

    setInterval(createHeart, 1200); // медленнее падение для чтения
  </script>

</body>
</html>
